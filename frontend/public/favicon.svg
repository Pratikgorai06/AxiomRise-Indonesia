<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background square with rounded corners -->
  <rect width="64" height="64" rx="14" fill="#0A1128"/>
  <!-- Subtle border -->
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.5" stroke="#C5A059" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- "A" lettermark — bold geometric sans-serif style -->
  <!-- Left diagonal stroke -->
  <path d="M16 50L32 14L48 50" stroke="#C5A059" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Crossbar -->
  <path d="M22 37H42" stroke="#C5A059" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Small "R" flourish — bottom right subtlety -->
  <circle cx="50" cy="50" r="3" fill="#C5A059" fill-opacity="0.25"/>
  <circle cx="50" cy="50" r="1.5" fill="#C5A059" fill-opacity="0.7"/>
</svg>